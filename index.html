<!DOCTYPE html>

<head>

        <img src="photo.jpg" alt="謝佳伶" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 3px solid #8c7851;">
        
        <br>
        <h1>謝佳伶</h1>
        
        <p class="info">亞洲大學 | 學號：AU114055027</p>

        <div style="text-align: left; max-width: 300px; margin: auto;">
            <h3>專業技能</h3>
            <ul>
                <li>AutoCAD / SketchUp</li>
